# CI/CD workflow skeleton for the Page Pilot Chrome Extension.
# Builds the extension on every push and PR; packages a zip for Chrome Web Store upload.

name: Extension — Build & Package

on:
  push:
    branches: [main]
    paths:
      - "extension/**"
      - ".github/workflows/extension-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "extension/**"

jobs:
  build:
    name: Build extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Type check
        working-directory: extension
        run: npm run typecheck

      - name: Build extension
        working-directory: extension
        env:
          VITE_BACKEND_URL: ${{ secrets.VITE_BACKEND_URL }}
        run: npm run build

      - name: Package extension zip
        working-directory: extension
        run: |
          zip -r ../page-pilot-extension.zip dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: page-pilot-extension
          path: page-pilot-extension.zip
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Publish to Chrome Web Store — stub. Requires CRX_PRIVATE_KEY and
  # CHROME_WEBSTORE_* secrets to be configured in the repo.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to Chrome Web Store
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Publish (stub — configure Chrome Web Store credentials)
        run: echo "TODO: add chrome-webstore-upload-cli step here"
