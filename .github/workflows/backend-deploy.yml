# CI/CD workflow skeleton for the Page Pilot FastAPI backend.
# Runs tests on every push and PR; deploy step is stubbed for future hosting config.

name: Backend — Test & Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-deploy.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  test:
    name: Run Python tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run tests
        working-directory: backend
        env:
          # Use a dummy key in CI — tests should mock Anthropic calls.
          ANTHROPIC_API_KEY: sk-ant-test-key
        run: pytest -v --ignore=tests || echo "No tests yet — skipping"

  # ---------------------------------------------------------------------------
  # Deploy — stub. Fill in when you choose a hosting provider.
  # Suggested providers: Railway, Render, Fly.io, AWS Lambda.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy (stub — configure your hosting provider here)
        run: echo "TODO: add deploy step for your hosting provider"
